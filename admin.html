<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pannello Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-box { background: white; padding: 30px; border-radius: 16px; margin: auto 0; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div class="container" style="display: flex;">
        <div class="admin-box" id="loginBox">
            <h1>Accesso Admin 🔐</h1>
            <p>Inserisci la password di amministrazione.</p>
            <input type="password" id="adminPwd" placeholder="Password" style="width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; text-align: center; font-size: 1.1rem; margin-bottom: 15px;" />
            <button onclick="loginAdmin()">Accedi</button>
        </div>
        
        <div class="admin-box" id="controlBox" style="display: none;">
            <h1>Pannello di Controllo</h1>
            <p style="color: var(--danger); font-weight: bold;">⚠️ ATTENZIONE ⚠️</p>
            <p>Questa azione eliminerà permanentemente tutti i giocatori e tutti i punteggi registrati nel database.</p>
            <button class="danger mt-3" onclick="resetDatabase()">Azzera Database Completo</button>
        </div>
    </div>

    <script>
        function loginAdmin() {
            const pwd = document.getElementById('adminPwd').value;
            if (pwd === '0825') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('controlBox').style.display = 'block';
            } else {
                alert('Password errata!');
            }
        }

        async function resetDatabase() {
            if (confirm('Sei veramente sicuro di voler cancellare tutto in modo irreversibile?')) {
                const pwd = document.getElementById('adminPwd').value;
                try {
                    const res = await fetch('/api/admin/reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: pwd })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('Database azzerato con successo! Le operazioni in background sono state fermate.');
                    } else {
                        alert(data.error || 'Errore durante l\'azzeramento');
                    }
                } catch(e) { 
                    alert('Errore di connessione'); 
                }
            }
        }
    </script>
</body>
</html>
